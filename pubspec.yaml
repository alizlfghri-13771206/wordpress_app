name: wordpress_app
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  provider: ^6.1.5+1
  collection: ^1.19.1
  intl: ^0.20.2
  flutter_inappwebview: ^6.1.5
  shamsi_date: ^1.1.1
  flutter_native_splash: ^2.4.7
  loading_animation_widget: ^1.3.0
  flutter_secure_storage: ^10.0.0
  persistent_bottom_nav_bar: ^6.2.1
  shared_preferences: ^2.5.5
  animated_bottom_navigation_bar: ^1.4.0
  page_transition: ^2.2.1
  http: ^1.6.0
  convert: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: laleh
      fonts:
        - asset: assets/fonts/Lalezar-Regular.ttf
    - family: yekan
      fonts:
        - asset: assets/fonts/BYekan+.ttf
    - family: sans
      fonts:
        - asset: assets/fonts/Iranian Sans.ttf



